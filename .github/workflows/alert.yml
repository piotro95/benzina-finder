name: Alert benzina

# Esecuzione schedulata + possibilità di lancio manuale dalla tab Actions.
on:
  schedule:
    # 06:30 UTC = 08:30 ora italiana (estate) / 07:30 (inverno).
    # GitHub usa SEMPRE UTC: regola qui se vuoi un orario civile fisso.
    - cron: "30 7 * * *"
  workflow_dispatch: {}   # bottone "Run workflow" manuale

# Permessi minimi: il job non scrive nulla nella repo.
permissions:
  contents: read

# Evita run sovrapposti se uno è lento.
concurrency:
  group: alert-benzina
  cancel-in-progress: false

jobs:
  alert:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Verifica Python
        env:
          PYTHON_EXE: ${{ secrets.PYTHON_EXE }}
        run: & "$env:PYTHON_EXE" --version

      - name: Install deps
        env:
          PYTHON_EXE: ${{ secrets.PYTHON_EXE }}
        run: & "$env:PYTHON_EXE" -m pip install --user -r requirements.txt

      - name: Esegui e invia su Telegram
        env:
          PYTHON_EXE: ${{ secrets.PYTHON_EXE }}
          START_LAT:  ${{ secrets.START_LAT }}
          START_LON:  ${{ secrets.START_LON }}
          START_NOME: ${{ secrets.START_NOME }}
          TG_TOKEN:   ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: & "$env:PYTHON_EXE" main.py --telegram --no-export
